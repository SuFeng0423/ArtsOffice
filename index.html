<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>音乐艺考教务系统 — 配色方案总览</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ease:cubic-bezier(.4,0,.2,1);
    --shadow-sm:0 1px 3px rgba(0,0,0,.08);
    --shadow-md:0 4px 16px rgba(0,0,0,.1);
    --shadow-lg:0 12px 40px rgba(0,0,0,.15);
    --radius:12px;
    --radius-sm:8px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  }
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{font-family:var(--font);background:#eef1f5;color:#1a1a2e;line-height:1.6;overflow-x:hidden}

  /* ===== Header ===== */
  .header{
    position:sticky;top:0;z-index:100;
    background:rgba(238,241,245,.85);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(0,0,0,.06);
    padding:0 32px;height:64px;
    display:flex;align-items:center;justify-content:space-between;
    transition:box-shadow .3s var(--ease);
  }
  .header.scrolled{box-shadow:var(--shadow-sm)}
  .header-left{display:flex;align-items:center;gap:16px}
  .header h1{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .header h1 span{color:#6366f1}
  .btn-group{display:flex;gap:8px}
  .btn{
    padding:8px 20px;border:none;border-radius:20px;font-size:13px;font-weight:600;
    cursor:pointer;transition:all .25s var(--ease);font-family:var(--font);
  }
  .btn-overview{background:#6366f1;color:#fff}
  .btn-overview.active{background:#4f46e5;box-shadow:0 2px 12px rgba(99,102,241,.4)}
  .btn-compare{background:#fff;color:#555;border:1.5px solid #ddd}
  .btn-compare.active{background:#6366f1;color:#fff;border-color:#6366f1;box-shadow:0 2px 12px rgba(99,102,241,.4)}

  /* ===== Main Container ===== */
  .container{max-width:1440px;margin:0 auto;padding:32px}

  /* ===== Overview Grid ===== */
  .view{display:none;animation:fadeUp .5s var(--ease)}
  .view.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .overview-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:24px;
  }
  .scheme-card{
    background:#fff;border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow-sm);cursor:pointer;
    transition:all .35s var(--ease);position:relative;
    contain:layout paint;
  }
  .scheme-card:hover{
    transform:translateY(-6px);box-shadow:var(--shadow-lg);
  }
  .scheme-card .card-header{
    height:120px;position:relative;overflow:hidden;
    display:flex;align-items:flex-end;padding:16px 20px;
  }
  .scheme-card .card-header::before{
    content:'';position:absolute;inset:0;
    background:inherit;filter:blur(0);opacity:.12;
  }
  .scheme-card .card-header .label{
    position:relative;z-index:1;
    color:#fff;font-size:22px;font-weight:800;
    text-shadow:0 1px 4px rgba(0,0,0,.2);
  }
  .scheme-card .card-header .sublabel{
    position:relative;z-index:1;
    color:rgba(255,255,255,.85);font-size:12px;font-weight:500;
    margin-top:2px;
  }
  .scheme-card .colors-row{
    display:flex;padding:14px 20px;gap:8px;
  }
  .color-dot{
    flex:1;height:44px;border-radius:var(--radius-sm);
    transition:transform .2s var(--ease);position:relative;
  }
  .color-dot:hover{transform:scaleY(1.15)}
  .color-dot .hex{
    position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
    font-size:10px;color:#888;white-space:nowrap;opacity:0;
    transition:opacity .2s;
  }
  .color-dot:hover .hex{opacity:1}
  .scheme-card .card-body{padding:12px 20px 8px}
  .scheme-card .tag{
    display:inline-block;padding:3px 10px;border-radius:12px;
    font-size:11px;font-weight:600;margin-bottom:8px;
  }
  .scheme-card .desc{font-size:13px;color:#666;line-height:1.5}
  .scheme-card .side-labels{
    display:flex;gap:6px;padding:10px 20px 16px;
  }
  .side-label{
    padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;
  }

  /* ===== Detail Panel (overlay) ===== */
  .detail-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
    opacity:0;pointer-events:none;
    transition:opacity .35s var(--ease);
  }
  .detail-overlay.open{opacity:1;pointer-events:all}
  .detail-panel{
    position:fixed;top:0;right:-100%;bottom:0;z-index:201;
    width:min(960px,95vw);
    background:#fff;
    box-shadow:-8px 0 40px rgba(0,0,0,.15);
    transition:right .45s var(--ease);
    overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
  }
  .detail-panel.open{right:0}
  .detail-inner{padding:0}

  .detail-hero{
    height:200px;position:relative;
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:32px 40px;color:#fff;
  }
  .detail-hero::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(transparent 30%,rgba(0,0,0,.4));
  }
  .detail-hero>*{position:relative;z-index:1}
  .detail-hero h2{font-size:28px;font-weight:800;margin-bottom:4px}
  .detail-hero p{font-size:14px;opacity:.85}
  .detail-close{
    position:absolute;top:20px;right:20px;z-index:2;
    width:40px;height:40px;border-radius:50%;border:none;
    background:rgba(255,255,255,.2);color:#fff;font-size:20px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .2s;backdrop-filter:blur(8px);
  }
  .detail-close:hover{background:rgba(255,255,255,.35)}

  .detail-section{padding:28px 40px}
  .detail-section h3{font-size:16px;font-weight:700;margin-bottom:16px;color:#333}
  .palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
  .palette-item{text-align:center}
  .palette-swatch{
    height:80px;border-radius:var(--radius-sm);margin-bottom:8px;
    transition:transform .2s var(--ease);box-shadow:var(--shadow-sm);
  }
  .palette-swatch:hover{transform:scale(1.05)}
  .palette-name{font-size:12px;font-weight:600;color:#444;margin-bottom:2px}
  .palette-hex{font-size:11px;color:#999;font-family:'SF Mono',Menlo,monospace}

  /* Mock UI Preview */
  .mock-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px}
  .mock-card{
    border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow-sm);border:1px solid #eee;
  }
  .mock-card-header{
    padding:14px 18px;font-size:13px;font-weight:700;color:#fff;
    display:flex;align-items:center;gap:8px;
  }
  .mock-card-body{padding:18px;background:#fff}
  .mock-card-body-scroll{
    overflow-x:auto;
    overflow-y:hidden;
    overscroll-behavior-x:contain;
    overscroll-behavior-y:auto;
  }
  .mock-sidebar{
    width:200px;height:320px;border-radius:var(--radius-sm);padding:16px;
    display:flex;flex-direction:column;gap:12px;
  }
  .mock-sidebar .nav-item{
    padding:8px 12px;border-radius:6px;font-size:12px;font-weight:500;
    transition:all .2s;
  }
  .mock-sidebar .nav-item.active{color:#fff;font-weight:700}
  .mock-btn{
    display:inline-block;padding:8px 20px;border-radius:6px;
    font-size:12px;font-weight:600;border:none;cursor:default;
  }
  .mock-stat{
    padding:16px;border-radius:var(--radius-sm);text-align:center;
  }
  .mock-stat .num{font-size:24px;font-weight:800}
  .mock-stat .label{font-size:11px;margin-top:4px;opacity:.7}
  .mock-timetable{
    display:grid;grid-template-columns:60px repeat(5,1fr);gap:2px;
    border-radius:var(--radius-sm);overflow:hidden;font-size:11px;
  }
  .mock-timetable .cell{
    padding:8px 4px;text-align:center;min-height:36px;
    display:flex;align-items:center;justify-content:center;
  }
  .mock-timetable .header-cell{font-weight:700;font-size:10px}
  .mock-timetable .course{
    border-radius:4px;color:#fff;font-weight:600;padding:4px 2px;
    font-size:10px;
  }
  .preview-shell{
    border-radius:var(--radius-sm);
    border:1px dashed #d9dee6;
    padding:12px;
    min-height:280px;
    overflow-x:auto;
    overflow-y:hidden;
    overscroll-behavior-x:contain;
    overscroll-behavior-y:auto;
  }
  .preview-grid{
    display:grid;
    grid-template-columns:repeat(12,minmax(0,1fr));
    gap:10px;
    min-width:560px;
  }
  .preview-block{
    border-radius:10px;
    min-height:64px;
    border:1px solid rgba(0,0,0,.06);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:700;
    color:rgba(255,255,255,.92);
    letter-spacing:.02em;
  }
  .preview-block.light{color:#2f3640}
  .preview-col-12{grid-column:span 12}
  .preview-col-8{grid-column:span 8}
  .preview-col-6{grid-column:span 6}
  .preview-col-4{grid-column:span 4}
  .preview-col-3{grid-column:span 3}
  .mock-phone{
    width:180px;height:360px;border-radius:24px;overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.12);border:3px solid #222;
    margin:0 auto;position:relative;flex-shrink:0;
  }
  .mock-phone-notch{
    width:80px;height:18px;background:#222;border-radius:0 0 12px 12px;
    margin:0 auto;position:relative;z-index:2;
  }
  .mock-phone-screen{
    height:calc(100% - 18px);padding:12px;overflow:hidden;
    display:flex;flex-direction:column;gap:8px;
  }
  .mock-phone-greeting{
    padding:16px;border-radius:12px;color:#fff;
    font-size:13px;font-weight:700;
  }
  .mock-phone-greeting small{font-size:10px;font-weight:400;opacity:.8;display:block;margin-top:2px}
  .mock-phone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1}
  .mock-phone-card{
    border-radius:10px;padding:10px;display:flex;flex-direction:column;
    justify-content:space-between;min-height:70px;
  }
  .mock-phone-card .icon{font-size:18px;margin-bottom:4px}
  .mock-phone-card .text{font-size:10px;font-weight:600}
  .mock-phone-card .sub{font-size:9px;opacity:.7}

  /* ===== Compare View ===== */
  .compare-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:20px;
  }
  .compare-col{
    background:#fff;border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow-sm);transition:all .35s var(--ease);
    cursor:pointer;
    contain:layout paint;
  }
  .compare-col:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
  .compare-col .col-header{
    height:80px;display:flex;flex-direction:column;
    justify-content:center;padding:0 16px;color:#fff;
  }
  .compare-col .col-header h4{font-size:15px;font-weight:800}
  .compare-col .col-header small{font-size:10px;opacity:.8}
  .compare-col .col-colors{display:flex;flex-direction:column;gap:2px}
  .compare-col .col-color-row{
    display:flex;height:32px;
  }
  .compare-col .col-color-cell{flex:1}
  .compare-col .col-label{
    padding:8px 16px;font-size:11px;font-weight:600;
    border-bottom:1px solid #f0f0f0;
    display:flex;align-items:center;gap:6px;
  }
  .compare-col .col-preview{padding:16px}
  .compare-col .col-preview .mini-btn{
    display:inline-block;padding:4px 12px;border-radius:4px;
    font-size:10px;font-weight:600;color:#fff;margin:2px;
  }
  .compare-col .col-preview .mini-card{
    height:40px;border-radius:6px;margin-bottom:6px;
    display:flex;align-items:center;padding:0 10px;
    font-size:10px;font-weight:600;
  }

  /* ===== Responsive ===== */
  @media(max-width:1100px){
    .overview-grid{grid-template-columns:1fr}
    .compare-grid{grid-template-columns:repeat(2,1fr)}
    .mock-section{grid-template-columns:1fr}
    .detail-section{padding:20px 24px}
    .preview-grid{min-width:500px}
  }
  @media(max-width:640px){
    .container{padding:16px}
    .compare-grid{grid-template-columns:1fr}
    .detail-panel{width:100vw}
    .header{padding:0 14px;height:56px}
    .header h1{font-size:14px}
    .btn{padding:7px 14px;font-size:12px}
    .overview-grid{grid-template-columns:1fr;gap:14px}
    .scheme-card .card-header{height:100px;padding:12px 14px}
    .scheme-card .card-header .label{font-size:18px}
    .scheme-card .colors-row{padding:10px 14px}
    .scheme-card .card-body{padding:10px 14px 6px}
    .scheme-card .side-labels{padding:8px 14px 12px}
    .detail-hero{height:160px;padding:18px 16px}
    .detail-hero h2{font-size:20px}
    .detail-nav{padding:12px 16px 0;flex-wrap:wrap}
    .detail-nav .nav-btn{font-size:11px;padding:6px 10px}
    .detail-nav .nav-btn:last-child{margin-left:0}
    .detail-section{padding:16px}
    .palette-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .mock-sidebar{width:100%;height:auto}
    .mock-timetable{grid-template-columns:48px repeat(5,1fr)}
    .mock-phone{width:100%;max-width:240px;height:auto;aspect-ratio:1/2}
    .teacher-layout,.student-layout{display:block}
    .student-side{max-width:none;width:100%;padding-top:0}
    .preview-shell{padding:10px;min-height:220px}
    .preview-grid{min-width:440px;gap:8px}
    .preview-block{min-height:56px;font-size:10px}
  }
  @media(hover:none){
    .scheme-card:hover,.compare-col:hover,.color-dot:hover,.palette-swatch:hover{
      transform:none;
      box-shadow:var(--shadow-sm);
    }
    .color-dot .hex{display:none}
  }
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
  }

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#aaa}

  /* Tooltip on color dots */
  .color-tip{
    position:fixed;z-index:300;padding:6px 12px;
    background:#1a1a2e;color:#fff;font-size:11px;font-weight:600;
    border-radius:6px;pointer-events:none;opacity:0;
    transition:opacity .15s;font-family:'SF Mono',Menlo,monospace;
    box-shadow:var(--shadow-md);
  }
  .color-tip.show{opacity:1}

  /* Back button in detail */
  .detail-nav{padding:16px 40px 0;display:flex;gap:8px}
  .detail-nav .nav-btn{
    padding:6px 14px;border-radius:6px;border:1.5px solid #ddd;
    background:#fff;font-size:12px;font-weight:600;cursor:pointer;
    transition:all .2s;font-family:var(--font);
  }
  .detail-nav .nav-btn:hover{border-color:#6366f1;color:#6366f1}
  .detail-nav .nav-btn.disabled{opacity:.3;pointer-events:none}
  .teacher-layout,.student-layout{display:block}
  .student-side{width:100%;max-width:none;display:block;padding-top:0}
  .btn,.scheme-card,.compare-col,.nav-btn,.detail-close,.color-dot,.palette-swatch{
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }
  .mock-card-body-scroll::-webkit-scrollbar,
  .preview-shell::-webkit-scrollbar{height:10px;width:10px}
  .mock-card-body-scroll::-webkit-scrollbar-track,
  .preview-shell::-webkit-scrollbar-track{
    background:linear-gradient(90deg,#edf1f6,#e4e9f1);
    border-radius:999px;
  }
  .mock-card-body-scroll::-webkit-scrollbar-thumb,
  .preview-shell::-webkit-scrollbar-thumb{
    background:linear-gradient(90deg,#8aa0c8,#647aa5);
    border-radius:999px;
    border:2px solid transparent;
    background-clip:padding-box;
  }
  .mock-card-body-scroll::-webkit-scrollbar-thumb:hover,
  .preview-shell::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(90deg,#768fbe,#53698f);
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header" id="header">
  <div class="header-left">
    <h1><span>♪</span> 音乐艺考教务系统 · 配色方案</h1>
  </div>
  <div class="btn-group">
    <button class="btn btn-overview active" onclick="switchView('overview')">卡片总览</button>
    <button class="btn btn-compare" onclick="switchView('compare')">全局对比</button>
  </div>
</header>

<!-- Color Tooltip -->
<div class="color-tip" id="colorTip"></div>

<!-- ===== Overview ===== -->
<div class="container">
  <div class="view active" id="viewOverview">
    <div class="overview-grid" id="overviewGrid"></div>
  </div>

  <div class="view" id="viewCompare">
    <div class="compare-grid" id="compareGrid"></div>
  </div>
</div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-inner" id="detailInner"></div>
</div>

// ===== RENDER OVERVIEW =====

      <div class="card-header" style="background:linear-gradient(135deg,${s.teacher.primary},${s.teacher.secondary})">

          <div class="label">${s.icon} ${s.name}</div>
          <div class="sublabel">${s.sub}</div>
        </div>
      </div>

// ===== RENDER DETAIL =====
function renderDetail(idx){
  const s = schemes[idx];
  const t = s.teacher, st = s.student;

  const textColor = (bg)=>{
    const r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16);
    return (r*299+g*587+b*114)/1000 > 160 ? '#1a1a2e' : '#fff';
  };

  const isLight = (c)=>{const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return (r*299+g*587+b*114)/1000 > 200};
  const borderFor = (c)=> isLight(c)?'#e0e0e0':'transparent';

  const paletteHTML = (colors, label)=>{
    const items = [
      {name:'主色 Primary',hex:colors.primary},
      {name:'辅色 Secondary',hex:colors.secondary},
      {name:'强调色 Accent',hex:colors.accent},
      {name:'背景色 Background',hex:colors.bg},
      {name:'卡片色 Card',hex:colors.card},
      {name:'文字色 Text',hex:colors.text},
      {name:'弱文字 Muted',hex:colors.muted},
      ...(colors.border?[{name:'边框色 Border',hex:colors.border}]:[]),
      ...(colors.success?[{name:'成功 Success',hex:colors.success}]:[]),
      ...(colors.warning?[{name:'警告 Warning',hex:colors.warning}]:[]),
      ...(colors.danger?[{name:'危险 Danger',hex:colors.danger}]:[]),
      ...(colors.gradient?[{name:'渐变 Gradient',hex:colors.gradient,isGrad:true}]:[]),
    ];
    return `<div class="palette-grid">${items.map(it=>
      `<div class="palette-item">
        <div class="palette-swatch" style="background:${it.hex};border:1px solid ${borderFor(it.hex)}" data-hex="${it.isGrad?'':it.hex}"></div>
        <div class="palette-name">${it.name}</div>
        <div class="palette-hex">${it.isGrad?'gradient':it.hex}</div>
      </div>`
    ).join('')}</div>`;
  };

  // Teacher mock
  const teacherMock = `
    <div class="teacher-layout">
      <div class="mock-card" style="border-color:${t.border}">
        <div class="mock-card-header" style="background:${t.primary}">教师端模块布局预览（Web）</div>
        <div class="mock-card-body mock-card-body-scroll" style="background:${t.bg}">
          <div class="preview-shell" style="background:${t.card}">
            <div class="preview-grid">
              <div class="preview-block preview-col-12" style="background:${t.primary}">公共导航信息栏（顶部）</div>
              <div class="preview-block preview-col-3 light" style="background:${t.secondary}1f">菜单栏（左侧）</div>
              <div class="preview-block preview-col-9 light" style="background:${t.bg};border-color:${t.border}">主要内容展示区（右侧）</div>
              <div class="preview-block preview-col-3 light" style="background:${t.primary}18">信息概览</div>
              <div class="preview-block preview-col-3 light" style="background:${t.secondary}18">视频管理</div>
              <div class="preview-block preview-col-3 light" style="background:${t.accent}1f">承继关系</div>
              <div class="preview-block preview-col-3 light" style="background:${t.primary}14">人员管理</div>
              <div class="preview-block preview-col-3 light" style="background:${t.secondary}16">系统管理</div>
              <div class="preview-block preview-col-9 light" style="background:${t.bg};border-color:${t.border}">数据表格 / 详情 / 操作区</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Student mock
  const studentMock = `
    <div class="student-layout">
      <div class="mock-card" style="border-color:${st.border}">
        <div class="mock-card-header" style="background:${st.primary}">学生小程序端模块布局预览</div>
        <div class="mock-card-body mock-card-body-scroll" style="background:${st.bg}">
          <div class="preview-shell" style="background:${st.card}">
            <div class="preview-grid">
              <div class="preview-block preview-col-12" style="background:${st.gradient||st.primary}">内容展示区（顶部）</div>
              <div class="preview-block preview-col-6 light" style="background:${st.bg};border-color:${st.border}">列表内容区</div>
              <div class="preview-block preview-col-6 light" style="background:${st.secondary}16">详情内容区</div>
              <div class="preview-block preview-col-4 light" style="background:${st.primary}16">视频库</div>
              <div class="preview-block preview-col-4 light" style="background:${st.secondary}16">成绩查询</div>
              <div class="preview-block preview-col-4 light" style="background:${st.accent}1f">个人中心</div>
              <div class="preview-block preview-col-12" style="background:${st.primary}">菜单导航（底部）</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  const canPrev = idx > 0;
  const canNext = idx < schemes.length - 1;

  document.getElementById('detailInner').innerHTML = `
    <div class="detail-hero" style="background:linear-gradient(135deg,${t.primary},${t.secondary})">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <h2>${s.icon} 方案${typeof s.id==='string'?s.id:s.id} · ${s.name}</h2>
      <p>${s.sub} ｜ ${s.tone} ｜ 适合：${s.best}</p>
    </div>
    <div class="detail-nav">
      <button class="nav-btn ${canPrev?'':'disabled'}" onclick="${canPrev?`openDetail(${idx-1})`:''}">← 上一方案</button>
      <button class="nav-btn ${canNext?'':'disabled'}" onclick="${canNext?`openDetail(${idx+1})`:''}">下一方案 →</button>
      <button class="nav-btn" onclick="closeDetail()" style="margin-left:auto">返回总览</button>
    </div>
    <div class="detail-section" style="background:${t.bg};border-top:1px solid ${t.border};border-bottom:1px solid ${t.border}">
      <h3>🖥️ 教师端 UI 预览</h3>
      ${teacherMock}
    </div>
    <div class="detail-section" style="background:${st.bg};border-top:1px solid ${st.border};border-bottom:1px solid ${st.border}">
      <h3>📱 学生端 UI 预览</h3>
      ${studentMock}
    </div>
    <div style="height:60px"></div>
  `;
}

// ===== ACTIONS =====
function switchView(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  if(view==='overview'){
    document.getElementById('viewOverview').classList.add('active');
    document.querySelector('.btn-overview').classList.add('active');
  }else{
    document.getElementById('viewCompare').classList.add('active');
    document.querySelector('.btn-compare').classList.add('active');
  }
}

function openDetail(idx){
  currentIdx = idx;
  renderDetail(idx);
  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailPanel').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  document.body.style.overflow = '';
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(!document.getElementById('detailPanel').classList.contains('open')) return;
  if(e.key==='Escape') closeDetail();
  if(e.key==='ArrowLeft' && currentIdx>0) openDetail(currentIdx-1);
  if(e.key==='ArrowRight' && currentIdx<schemes.length-1) openDetail(currentIdx+1);
});

// Header scroll effect (rAF throttle + passive)
let ticking = false;
window.addEventListener('scroll',()=>{
  if(ticking) return;
  ticking = true;
  requestAnimationFrame(()=>{
    document.getElementById('header').classList.toggle('scrolled', window.scrollY > 10);
    ticking = false;
  });
},{ passive:true });

// Color tooltip (desktop only)
if(canHover){
  document.addEventListener('mouseover',e=>{
    const dot = e.target.closest('[data-hex]');
    if(!dot || !dot.dataset.hex) return;
    const tip = document.getElementById('colorTip');
    tip.textContent = dot.dataset.hex;
    tip.classList.add('show');
    const r = dot.getBoundingClientRect();
    tip.style.left = (r.left + r.width / 2 - 30) + 'px';
    tip.style.top = (r.top - 32) + 'px';
  });
  document.addEventListener('mouseout',e=>{
    if(e.target.closest('[data-hex]')){
      document.getElementById('colorTip').classList.remove('show');
    }
  });
}

// Init
renderOverview();
renderCompare();
</script>
